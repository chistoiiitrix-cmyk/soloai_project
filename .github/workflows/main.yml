name: Daily Tool Update

on:
  schedule:
    - cron: '0 0 * * *' # Запуск каждый день в полночь
  workflow_dispatch: # Позволяет запустить вручную

# Добавляем права на запись в репозиторий
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Run update bot
        run: python bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "SoloAI-Bot"
          git config --global user.email "bot@soloai.hub"
          git add tools.json
          git commit -m "Auto-update tools list" || echo "No changes to commit"
          git push
