name: Daily Auto-Update
on:
  schedule:
    - cron: '0 */6 * * *' # Каждые 6 часов
  workflow_dispatch: 
permissions:
  contents: write
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: pip install requests feedparser

      - name: Run update bot
        # Вот здесь мы передаем секрет в бота
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: python bot.py

      - name: Commit and push changes
        run: |
          git config --global user.name "SoloAI-Bot"
          git config --global user.email "bot@soloai.hub"
          git add tools.json articles.json
          git commit -m "Auto-update: tools and articles" || echo "No changes"
          git push
